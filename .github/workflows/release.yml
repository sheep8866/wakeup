name: Release

# Builds standalone `wakeup` binaries for every platform wakeup-core actually
# supports and attaches them to a GitHub Release. This is what lets
# downstream consumers (e.g. the herdr-wakeup plugin) vendor a prebuilt
# binary instead of requiring every end user to have a Rust toolchain.
#
# Triggers on a `vX.Y.Z` tag push, or manually via workflow_dispatch against
# an existing tag (useful for re-running after a release workflow fix).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re-)build and attach assets to"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-14 runners are Apple Silicon (arm64) hosts, but Xcode's
          # toolchain ships both Darwin SDKs, so both Mac architectures are
          # built here without needing a second (Intel) runner.
          - os: macos-14
            target: aarch64-apple-darwin
            asset: wakeup-macos-arm64
            native: true
          - os: macos-14
            target: x86_64-apple-darwin
            asset: wakeup-macos-x86_64
            native: false
          # musl, not glibc: a glibc-linked binary built on whatever glibc
          # happens to ship in the runner's Ubuntu image will refuse to run
          # on any distro with an older glibc (confirmed the hard way: a
          # gnu-target build here failed with a GLIBC_2.39-not-found error
          # on plain debian:bookworm-slim). musl gives a fully static
          # binary with no runtime libc dependency at all, so it runs
          # unmodified on any Linux distro, glibc or musl-based.
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: wakeup-linux-x86_64
            native: true
            musl: true
          # ubuntu-24.04-arm is a native arm64 GitHub-hosted runner, so this
          # is a native build too, not a cross-compile - no cross-linker
          # setup needed, same as the x86_64 job.
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            asset: wakeup-linux-arm64
            native: true
            musl: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: wakeup-windows-x86_64.exe
            native: true

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl toolchain
        if: matrix.musl == true
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p wakeup

      - name: Stage binary
        shell: bash
        run: |
          mkdir -p dist
          src="target/${{ matrix.target }}/release/wakeup"
          if [ "${{ runner.os }}" = "Windows" ]; then
            src="${src}.exe"
          fi
          cp "$src" "dist/${{ matrix.asset }}"
          chmod +x "dist/${{ matrix.asset }}" || true

      - name: Smoke test (native target only)
        if: matrix.native == true
        shell: bash
        run: ./dist/${{ matrix.asset }} --version

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p out
          find dist -type f -exec cp {} out/ \;
          ls -la out

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: out/*
          generate_release_notes: true

  update-homebrew-tap:
    name: Update Homebrew formula
    needs: [build, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Compute SHA256s
        id: hashes
        run: |
          MACOS_ARM64_SHA=$(sha256sum dist/wakeup-macos-arm64/wakeup-macos-arm64 | awk '{print $1}')
          MACOS_X86_64_SHA=$(sha256sum dist/wakeup-macos-x86_64/wakeup-macos-x86_64 | awk '{print $1}')
          LINUX_X86_64_SHA=$(sha256sum dist/wakeup-linux-x86_64/wakeup-linux-x86_64 | awk '{print $1}')
          LINUX_ARM64_SHA=$(sha256sum dist/wakeup-linux-arm64/wakeup-linux-arm64 | awk '{print $1}')

          echo "macos-arm64=${MACOS_ARM64_SHA}" >> "$GITHUB_OUTPUT"
          echo "macos-x86_64=${MACOS_X86_64_SHA}" >> "$GITHUB_OUTPUT"
          echo "linux-x86_64=${LINUX_X86_64_SHA}" >> "$GITHUB_OUTPUT"
          echo "linux-arm64=${LINUX_ARM64_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set version
        id: version
        run: |
          VER="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${VER#v}" >> "$GITHUB_OUTPUT"

      - name: Render formula
        run: |
          node scripts/render-homebrew-formula.mjs \
            --version "${{ steps.version.outputs.version }}" \
            --sha256-macos-arm64 "${{ steps.hashes.outputs.macos-arm64 }}" \
            --sha256-macos-x86_64 "${{ steps.hashes.outputs.macos-x86_64 }}" \
            --sha256-linux-x86_64 "${{ steps.hashes.outputs.linux-x86_64 }}" \
            --sha256-linux-arm64 "${{ steps.hashes.outputs.linux-arm64 }}" \
            > wakeup.rb

      - name: Generate app token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Push to homebrew-tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAP_REPOSITORY: usrivastava92/homebrew-tap
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${TAP_REPOSITORY}.git" homebrew-tap
          cp wakeup.rb homebrew-tap/Formula/wakeup.rb

          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Formula is already up to date."
            exit 0
          fi

          git add Formula/wakeup.rb
          git commit -m "Update wakeup to ${{ steps.version.outputs.version }}"
          git push origin HEAD
